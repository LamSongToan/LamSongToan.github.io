<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-language Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-top: 50px; }
        .nav-bar { background: #1a252f; padding: 1rem; text-align: right; position: fixed; top: 0; width: 100%; left: 0; }
        .lang-btn { background: #3498db; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        header { background: #2c3e50; color: white; text-align: center; padding: 4rem 1rem; margin-top: 20px; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        section { background: white; padding: 2rem; margin-bottom: 2rem; border-radius: 8px; }
        h2 { color: #2c3e50; margin-bottom: 1rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <!-- Nút bấm hiển thị ngôn ngữ tiếp theo trong danh sách xoay vòng -->
        <button class="lang-btn" onclick="changeLanguage()" id="langBtn">Loading...</button>
    </div>

    <header>
        <h1 id="heroTitle">---</h1>
        <p id="heroSub">---</p>
    </header>

    <div class="container">
        <section>
            <h2 id="titleAbout">---</h2>
            <p id="textAbout">---</p>
        </section>
        <section>
            <h2 id="titleSkills">---</h2>
        </section>
    </div>

    <script>
        let translations = {}; 
        // Danh sách các ngôn ngữ bạn hỗ trợ theo thứ tự xoay vòng khi bấm nút
        const langOrder = ['vi', 'en', 'ja']; 
        let currentLangIndex = 0;

        // 1. Tự động tải dữ liệu từ tệp lang.json khi vừa vào trang web
        async function loadLanguageData() {
            try {
                const response = await fetch('lang.json');
                translations = await response.json();
                updateUI(); // Cập nhật chữ lên giao diện lần đầu tiên
            } catch (error) {
                console.error("Không thể tải tệp ngôn ngữ:", error);
            }
        }

        // 2. Hàm cập nhật nội dung chữ dựa vào các ID trong HTML
        function updateUI() {
            const currentLang = langOrder[currentLangIndex];
            const langData = translations[currentLang];

            if (!langData) return;

            // Tự động quét và thay đổi text cho các phần tử có ID trùng khớp với khóa trong JSON
            Object.keys(langData).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.innerText = langData[key];
                }
            });
        }

        // 3. Hàm xử lý khi người dùng bấm nút đổi ngôn ngữ (xoay vòng Vi -> Anh -> Nhật -> Vi)
        function changeLanguage() {
            currentLangIndex = (currentLangIndex + 1) % langOrder.length;
            updateUI();
        }

        // Chạy hàm tải dữ liệu ngay khi trang web được mở
        loadLanguageData();
    </script>
</body>
</html>
